<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ご当地モンスター">
<link rel="apple-touch-icon" href="/icon.jpg">
  <title>ご当地モンスター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0d1117;
    color: #f0ebe0;
    min-height: 100vh;
  }

  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('/hero.png');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    filter: brightness(0.5);
    z-index: 0;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo { text-align: center; }

  .logo h1 {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.8rem;
    color: #f5d67a;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(245,214,122,0.5), 2px 2px 0 #000;
    line-height: 1.2;
  }

  .logo p {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #aaa;
    margin-top: 6px;
  }

  .tagline {
    font-size: 1rem;
    color: #f0ebe0;
    text-align: center;
    text-shadow: 1px 1px 4px #000;
    letter-spacing: 0.05em;
  }

  .tab-bar { display: flex; gap: 8px; width: 100%; }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: #aaa;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: rgba(245,214,122,0.15);
    border-color: #f5d67a;
    color: #f5d67a;
  }

  .location-box {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }

  .location-text { font-size: 0.9rem; color: #f0ebe0; }
  .location-city { font-size: 1.4rem; font-weight: 700; color: #f5d67a; margin: 4px 0; }
  .location-sub { font-size: 0.75rem; color: #aaa; }

  .egg-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #8e44ad, #6c3483);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 15px rgba(142,68,173,0.4);
    width: 100%;
  }

  .egg-btn:hover { opacity: 0.85; }
  .egg-btn:active { transform: scale(0.97); }
  .egg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading-state { text-align: center; padding: 32px; display: none; }
  .loading-state.visible { display: block; }

  .hatch-loading {
    width: 100%;
    background: rgba(142,68,173,0.15);
    border: 1px solid rgba(142,68,173,0.4);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    display: none;
  }

  .hatch-loading.visible { display: block; }

  .hatch-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 16px;
  }

  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-10px) scale(1.1); }
  }

  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  @keyframes glow {
    from { filter: drop-shadow(0 0 5px rgba(245,214,122,0.5)); }
    to { filter: drop-shadow(0 0 20px rgba(245,214,122,1)); }
  }

  .hatch-emoji.shaking { animation: shake 0.3s ease-in-out infinite; }
  .hatch-emoji.glowing { animation: glow 0.5s ease-in-out infinite alternate; }
  .hatch-emoji.bouncing { animation: bounce 0.6s ease-in-out infinite alternate; }

  .hatch-message {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.1rem;
    color: #f5d67a;
    margin-bottom: 8px;
  }

  .hatch-sub { font-size: 0.8rem; color: #ccc; }

  .particles {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 1.2rem;
    animation: fadeInOut 1s ease-in-out infinite alternate;
  }

  @keyframes fadeInOut {
    from { opacity: 0.3; }
    to { opacity: 1; }
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #f5d67a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 0.85rem; color: #aaa; }

  .error-state {
    background: rgba(192,57,43,0.2);
    border: 1px solid #c0392b;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.85rem;
    color: #ff9999;
    display: none;
    width: 100%;
  }

  .error-state.visible { display: block; }

  .card {
    width: 100%;
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(245,214,122,0.3);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .card.visible { display: block; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .monster-icon-wrap {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(245,214,122,0.2);
  }

  .monster-icon-img { width: 100%; height: 100%; object-fit: cover; display: none; }

  .monster-emoji-large {
    font-size: 3.5rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(245,214,122,0.4));
  }

  .monster-meta { flex: 1; min-width: 0; }

  .monster-meta h2 {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.4rem;
    color: #f5d67a;
    margin-bottom: 4px;
  }

  .monster-meta .city-name { font-size: 0.75rem; color: #888; margin-bottom: 8px; }

  .stage-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .stage-badge.child { background: rgba(52,152,219,0.2); border: 1px solid #3498db; color: #3498db; }
  .stage-badge.adult { background: rgba(245,214,122,0.2); border: 1px solid #f5d67a; color: #f5d67a; }

  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-right: 4px;
    margin-bottom: 4px;
    border: 1px solid;
  }

  .section { margin-bottom: 18px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-content { font-size: 0.88rem; line-height: 1.8; color: #f0ebe0; }
  .lore-text { font-size: 0.8rem; line-height: 1.8; color: #ccc; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .stat-item {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-item .stat-label { font-size: 0.6rem; color: #888; margin-bottom: 4px; }
  .stat-item .stat-value { font-size: 1.2rem; font-weight: 700; color: #f5d67a; }

  .weather-affinity { display: flex; flex-wrap: wrap; gap: 6px; }
  .weather-tag { padding: 4px 10px; border-radius: 999px; font-size: 0.7rem; border: 1px solid; }
  .weather-tag.strong { border-color: #27ae60; color: #27ae60; }
  .weather-tag.weak { border-color: #c0392b; color: #c0392b; }

  /* 牧場・地図 */
  .farm-panel { width: 100%; display: none; }
  .farm-panel.visible { display: block; }

  .farm-sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; }

  .farm-sub-btn {
    flex: 1;
    padding: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #aaa;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .farm-sub-btn.active {
    background: rgba(245,214,122,0.15);
    border-color: #f5d67a;
    color: #f5d67a;
  }

  .trainer-card {
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(245,214,122,0.3);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .trainer-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8e44ad, #f5d67a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
  }

  .trainer-info { flex: 1; }
  .trainer-name { font-family: 'Hachi Maru Pop', serif; font-size: 1rem; color: #f5d67a; margin-bottom: 4px; }
  .trainer-level { font-size: 0.75rem; color: #aaa; margin-bottom: 6px; }

  .exp-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 999px; height: 6px; overflow: hidden; }
  .exp-bar { height: 100%; background: linear-gradient(90deg, #8e44ad, #f5d67a); border-radius: 999px; transition: width 0.5s ease; }
  .exp-text { font-size: 0.65rem; color: #888; margin-top: 4px; }

  .farm-grid { display: flex; flex-direction: column; gap: 12px; }

  .farm-card {
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }

  .farm-card.egg { border-color: rgba(142,68,173,0.4); }
  .farm-card.child { border-color: rgba(52,152,219,0.4); }
  .farm-card.adult { border-color: rgba(245,214,122,0.4); }

  .farm-icon {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  .farm-icon img { width: 100%; height: 100%; object-fit: cover; }

  .farm-info { flex: 1; min-width: 0; }
  .farm-name { font-family: 'Hachi Maru Pop', serif; font-size: 1rem; color: #f5d67a; }
  .farm-city { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
  .farm-status { font-size: 0.75rem; color: #aaa; }
  .farm-timer { font-size: 0.8rem; color: #f5d67a; font-weight: 700; margin-top: 4px; }

  .hatch-btn {
    margin-top: 6px;
    padding: 8px 14px;
    background: linear-gradient(135deg, #8e44ad, #6c3483);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    width: 100%;
  }

  .hatch-btn:hover { opacity: 0.85; }

  .farm-empty {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    padding: 40px 20px;
  }

  .egg-result {
    width: 100%;
    background: rgba(142,68,173,0.15);
    border: 1px solid rgba(142,68,173,0.4);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    display: none;
  }

  .egg-result.visible { display: block; }
  .egg-result .egg-icon { font-size: 4rem; margin-bottom: 12px; }
  .egg-result h3 { font-family: 'Hachi Maru Pop', serif; color: #f5d67a; margin-bottom: 8px; }
  .egg-result p { font-size: 0.85rem; color: #ccc; line-height: 1.7; }

  /* 地図 */
  .map-panel { display: none; }
  .map-panel.visible { display: block; }

  .map-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .map-stat-item {
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(245,214,122,0.2);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .map-stat-value { font-size: 1.4rem; font-weight: 700; color: #f5d67a; }
  .map-stat-label { font-size: 0.65rem; color: #888; margin-top: 4px; }

  .prefecture-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .pref-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    font-size: 0.7rem;
    color: #666;
    transition: all 0.2s;
  }

  .pref-item.cleared {
    background: rgba(245,214,122,0.15);
    border-color: rgba(245,214,122,0.5);
    color: #f5d67a;
  }

  .pref-item.partial {
    background: rgba(142,68,173,0.15);
    border-color: rgba(142,68,173,0.4);
    color: #cc99ff;
  }

  .pref-name { font-size: 0.68rem; margin-bottom: 2px; }
  .pref-count { font-size: 0.6rem; }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.hidden { display: none; }

  .modal-box {
    background: #0d1117;
    border: 1px solid rgba(245,214,122,0.4);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .modal-box h2 { font-family: 'Hachi Maru Pop', serif; font-size: 1.4rem; color: #f5d67a; margin-bottom: 8px; }
  .modal-box p { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; line-height: 1.7; }

  .modal-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    color: #f0ebe0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    outline: none;
    margin-bottom: 16px;
    text-align: center;
  }

  .modal-input:focus { border-color: #f5d67a; }

  .modal-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #8e44ad, #6c3483);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  .modal-btn:hover { opacity: 0.85; }
  /* アバター選択 */
  .avatar-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    display: none;
  }

  .avatar-modal.visible { display: flex; }

  .avatar-box {
    background: #0d1117;
    border: 1px solid rgba(245,214,122,0.4);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .avatar-box h3 {
    font-family: 'Hachi Maru Pop', serif;
    color: #f5d67a;
    margin-bottom: 16px;
  }

  .avatar-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .avatar-item {
    font-size: 2rem;
    padding: 8px;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }

  .avatar-item:hover { border-color: #f5d67a; background: rgba(245,214,122,0.1); }
  .avatar-item.selected { border-color: #f5d67a; background: rgba(245,214,122,0.2); }

  .avatar-close {
    padding: 10px 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #aaa;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
  }

  /* レベルアップ */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    display: none;
  }

  .levelup-overlay.visible { display: flex; }

  .levelup-box { text-align: center; animation: levelupPop 0.5s ease-out; }

  @keyframes levelupPop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .levelup-text {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 2.5rem;
    color: #f5d67a;
    text-shadow: 0 0 30px rgba(245,214,122,0.8), 2px 2px 0 #000;
    margin-bottom: 8px;
  }

  .levelup-sub { font-size: 1rem; color: #fff; text-shadow: 1px 1px 4px #000; }
</style>
</head>
<body>

<div class="modal-overlay" id="nameModal">
  <div class="modal-box">
    <div style="font-size:3rem;margin-bottom:16px">🎮</div>
    <h2>トレーナー名を入力</h2>
    <p>あなたのトレーナー名を決めてください。<br>全国のモンスターを集める旅が始まります！</p>
    <input class="modal-input" id="nameInput" type="text" placeholder="トレーナー名" maxlength="12" />
    <button class="modal-btn" onclick="saveTrainerName()">🌟 冒険を始める</button>
  </div>
</div>
<div class="avatar-modal" id="avatarModal">
  <div class="avatar-box">
    <h3>アイコンを選ぶ</h3>
    <div class="avatar-grid" id="avatarGrid"></div>
    <button class="avatar-close" onclick="closeAvatarModal()">閉じる</button>
  </div>
</div>
<div class="levelup-overlay" id="levelupOverlay" onclick="this.classList.remove('visible')">
  <div class="levelup-box">
    <div style="font-size:4rem;margin-bottom:16px">⭐✨🌟</div>
    <div class="levelup-text" id="levelupText">LEVEL UP!</div>
    <div class="levelup-sub" id="levelupSub"></div>
    <div style="font-size:0.8rem;color:#aaa;margin-top:16px">タップして閉じる</div>
  </div>
</div>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">

    <div class="logo">
      <h1>ご当地モンスター</h1>
      <p>MONSTER GENERATOR — PROTOTYPE</p>
    </div>

    <p class="tagline">現地に行って卵を拾おう！</p>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('generate')">生成</button>
      <button class="tab-btn" onclick="switchTab('farm')">牧場 <span id="farmCount"></span></button>
    </div>

    <div id="generateTab" style="width:100%;display:flex;flex-direction:column;gap:20px;">
      <div class="location-box">
        <div class="location-text">現在地</div>
        <div class="location-city" id="detectedCity">取得中...</div>
        <div class="location-sub" id="detectedSub"></div>
        <button class="egg-btn" id="eggBtn" onclick="pickupEgg()" disabled>📍 この場所の卵を拾う</button>
      </div>

      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">現在地を取得中...</div>
      </div>

      <div class="hatch-loading" id="hatchLoading">

const LEVEL_TABLE = [0, 1, 2, 4, 6, 9, 12, 16, 20, 25, 30, 36, 42, 49, 56, 64, 72, 81, 90, 100];

function getTrainerLevel(adultCount) {
  let level = 1;
  for (let i = 0; i < LEVEL_TABLE.length; i++) {
    if (adultCount >= LEVEL_TABLE[i]) level = i + 1;
    else break;
  }
  return level;
}

function getExpProgress(adultCount) {
  const level = getTrainerLevel(adultCount);
  const currentThreshold = LEVEL_TABLE[level - 1] || 0;
  const nextThreshold = LEVEL_TABLE[level] || LEVEL_TABLE[level - 1] + 30;
  const progress = adultCount - currentThreshold;
  const needed = nextThreshold - currentThreshold;
  return { level, progress, needed, percent: Math.min(100, (progress / needed) * 100) };
}

function detectWard(lat, lon) {
  for (const [city, data] of Object.entries(SPECIAL_WARDS)) {
    const b = data.bounds;
    if (lat >= b.minLat && lat <= b.maxLat && lon >= b.minLon && lon <= b.maxLon) {
      for (const ward of data.wards) {
        if (lat >= ward.minLat && lat <= ward.maxLat && lon >= ward.minLon && lon <= ward.maxLon) {
          return ward.name;
        }
      }
      return city === 'tokyo' ? '東京都内' : '大阪市内';
    }
  }
  return null;
}

function countAdults() {
  const farm = getFarmData();
  return Object.values(farm).filter(e => e.stage === 'adult').length;
}

function getClearedPrefectures() {
  const farm = getFarmData();
  const prefSet = new Set();
  Object.entries(farm).forEach(([city, entry]) => {
    if (entry.stage === 'adult') {
      const pref = CITY_TO_PREF[city];
      if (pref) prefSet.add(pref);
      else {
        // 市名から都道府県を推定
        PREFECTURES.forEach(p => {
          if (city.includes(p.name.replace('県', '').replace('府', '').replace('都', '').replace('道', ''))) {
            prefSet.add(p.name);
          }
        });
      }
    }
  });
  return prefSet;
}

function getPartialPrefectures() {
  const farm = getFarmData();
  const prefSet = new Set();
  Object.entries(farm).forEach(([city, entry]) => {
    if (entry.stage !== 'adult') {
      const pref = CITY_TO_PREF[city];
      if (pref) prefSet.add(pref);
    }
  });
  return prefSet;
}

    });

function formatTimer(ms) {
  if (ms <= 0) return '準備完了！';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (h > 0) return h + '時間' + m + '分';
  if (m > 0) return m + '分' + s + '秒';
  return s + '秒';
}

    setTimeout(() => {
      emoji.textContent = '🐣';
      emoji.className = 'hatch-emoji bouncing';
      msg.textContent = '🐣 生まれてきています...！';
      sub.textContent = 'もう少しだけ待ってください';
      particles.textContent = '🌟 ⭐ 🌟';
    }, 8000);
  } else {
    emoji.textContent = '✨';
    emoji.className = 'hatch-emoji glowing';
    msg.textContent = '🌟 進化しています...！';
    sub.textContent = '姿が変わっていきます...';
    particles.textContent = '⚡ 🌈 ⚡';
    setTimeout(() => {
      emoji.textContent = '🌟';
      msg.textContent = '⭐ もうすぐ完成です...！';
      particles.textContent = '✨ 💫 🌟 💫 ✨';
    }, 8000);
  }
}

function hideHatchLoading() {
  document.getElementById('hatchLoading').classList.remove('visible');
  document.getElementById('hatchEmoji').className = 'hatch-emoji';
}

function showLevelUp(newLevel) {
  const overlay = document.getElementById('levelupOverlay');
  document.getElementById('levelupText').textContent = 'LEVEL ' + newLevel + ' ！';
  document.getElementById('levelupSub').textContent = 'トレーナーレベルが上がった！';
  overlay.classList.add('visible');
  setTimeout(() => overlay.classList.remove('visible'), 3000);
}

async function detectLocation() {
  document.getElementById('detectedCity').textContent = '取得中...';
  document.getElementById('eggBtn').disabled = true;
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 })
    );
    const { latitude: lat, longitude: lon } = pos.coords;
    const ward = detectWard(lat, lon);
    let cityName = ward;
    if (!cityName) {
      const geoRes = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=ja');
      const geoData = await geoRes.json();
      const addr = geoData.address || {};
      cityName = addr.city || addr.town || addr.village || addr.county || '不明';
    }
    detectedCity = cityName;
    document.getElementById('detectedCity').textContent = cityName;
    try {
      const weatherRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,pressure_msl,weathercode&timezone=auto');
      const weatherData = await weatherRes.json();
      const c = weatherData.current;
      const weatherType = WEATHER_CODES[c.weathercode] || 'clear';
      detectedWeather = weatherType;
      detectedTemp = c.temperature_2m;
      const wLabel = WEATHER_LABELS[weatherType] || weatherType;
      document.getElementById('detectedSub').textContent = wLabel + ' ' + c.temperature_2m + '°C';
    } catch(e) {}
    document.getElementById('eggBtn').disabled = false;
  } catch(e) {
    document.getElementById('detectedCity').textContent = '位置情報を取得できませんでした';
    document.getElementById('detectedSub').textContent = '位置情報の許可が必要です';
  }
}

async function pickupEgg() {
  if (!detectedCity) return;
  const userId = getUserId();
  document.getElementById('eggBtn').disabled = true;
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('loadingText').textContent = '卵を探しています...';
  document.getElementById('eggResult').classList.remove('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('errorState').classList.remove('visible');
  try {
    const res = await fetch('/api/egg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'pickup', city: detectedCity, userId }),
    });
    const data = await res.json();
    document.getElementById('loadingState').classList.remove('visible');
    if (data.status === 'egg_picked') {
      const farm = getFarmData();
      farm[detectedCity] = { stage: 'egg', egg: data.egg, weatherInfo: detectedWeather, temp: detectedTemp };
      saveFarmData(farm);
      showEggResult('🥚 卵を拾いました！', detectedCity + 'の卵を手に入れました。\n孵化したら牧場で「孵化させる」ボタンを押してください！');
    } else if (data.status === 'already_have_egg') {
      showEggResult('🥚 すでに卵があります', detectedCity + 'の卵はすでに持っています。牧場で確認してください。');
    } else if (data.status === 'already_generated') {
      renderMonster(data.monster);
    }
  } catch(e) {
    document.getElementById('loadingState').classList.remove('visible');
    const errEl = document.getElementById('errorState');
    errEl.textContent = 'エラー: ' + e.message;
    errEl.classList.add('visible');
  } finally {
    document.getElementById('eggBtn').disabled = false;
  }
}

function showEggResult(title, text) {
  document.getElementById('eggResultTitle').textContent = title;
  document.getElementById('eggResultText').textContent = text;
  document.getElementById('eggResult').classList.add('visible');
}

async function hatchNow(city) {
  if (hatchingCities[city]) return;
  hatchingCities[city] = true;
  const farm = getFarmData();
  const entry = farm[city];
  if (!entry) { hatchingCities[city] = false; return; }
  const isEgg = entry.stage === 'egg';
  const prevAdultCount = countAdults();
  showHatchLoading(isEgg);
  try {
    if (isEgg) {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, weatherInfo: entry.weatherInfo, stage: 'child' }),
      });
      const monster = await res.json();
      if (!monster.error) {
        const f = getFarmData();
        f[city] = { ...f[city], stage: 'child', monster };
        saveFarmData(f);
      }
    } else if (entry.stage === 'child') {
      const childMonster = entry.monster;
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, weatherInfo: entry.weatherInfo, stage: 'adult', childMonster }),
      });
      const monster = await res.json();
      if (!monster.error) {
        const f = getFarmData();
        f[city] = { ...f[city], stage: 'adult', monster };
        saveFarmData(f);
        const newAdultCount = countAdults();
        const prevLevel = getTrainerLevel(prevAdultCount);
        const newLevel = getTrainerLevel(newAdultCount);
        if (newLevel > prevLevel) showLevelUp(newLevel);
      }
    }
  } finally {
    hatchingCities[city] = false;
  }
  hideHatchLoading();
  renderFarm();
  if (currentTab === 'generate') {
    const f = getFarmData();
    if (f[city] && f[city].monster) renderMonster(f[city].monster);
  }
}

function switchTab(tab) {
  currentTab = tab;
  const btns = document.querySelectorAll('.tab-btn');
  btns[0].classList.toggle('active', tab === 'generate');
  btns[1].classList.toggle('active', tab === 'farm');
  document.getElementById('generateTab').style.display = tab === 'generate' ? 'flex' : 'none';
  document.getElementById('farmTab').classList.toggle('visible', tab === 'farm');
  if (tab === 'farm') renderFarm();
}

function switchFarmTab(tab) {
  currentFarmTab = tab;
  const btns = document.querySelectorAll('.farm-sub-btn');
  btns[0].classList.toggle('active', tab === 'monsters');
  btns[1].classList.toggle('active', tab === 'map');
  document.getElementById('monstersPanel').style.display = tab === 'monsters' ? 'block' : 'none';
  document.getElementById('mapPanel').classList.toggle('visible', tab === 'map');
  if (tab === 'map') renderMap();
}

function renderFarm() {
  renderTrainerCard();
  const farm = getFarmData();
  const grid = document.getElementById('farmGrid');
  if (!grid) return;
  if (Object.keys(farm).length === 0) {
    grid.innerHTML = '<div class="farm-empty">まだモンスターがいません<br>現地に行って卵を拾おう！</div>';
    return;
  }
  const now = Date.now();
  grid.innerHTML = Object.entries(farm).map(([city, entry]) => {
    const egg = entry.egg;
    let iconHtml = '', statusText = '', timerHtml = '', cardClass = 'farm-card';
    if (entry.stage === 'egg') {
      const remaining = egg.hatchAt - now;
      const ready = remaining <= 0;
      iconHtml = '<div class="farm-icon">🥚</div>';
      statusText = '卵';
      cardClass += ' egg';
      timerHtml = ready
        ? '<button class="hatch-btn" onclick="event.stopPropagation();hatchNow(\'' + city + '\')">🥚 孵化させる</button>'
        : '<div class="farm-timer">孵化まで ' + formatTimer(remaining) + '</div>';
    } else if (entry.stage === 'child') {
      const m = entry.monster;
      const imgSrc = m && m.imageUrl;
      iconHtml = imgSrc
        ? '<div class="farm-icon"><img src="' + imgSrc + '" alt="" /></div>'
        : '<div class="farm-icon">' + (m ? m.emoji || '👶' : '👶') + '</div>';
      const remaining = egg.growAt - now;
      const ready = remaining <= 0;
      statusText = '👶 子供';
      cardClass += ' child';
      timerHtml = ready
        ? '<button class="hatch-btn" onclick="event.stopPropagation();hatchNow(\'' + city + '\')">⭐ 進化させる</button>'
        : '<div class="farm-timer">大人まで ' + formatTimer(remaining) + '</div>';
    } else {
      const m = entry.monster;
      const imgSrc = m && m.imageUrl;
      iconHtml = imgSrc
        ? '<div class="farm-icon"><img src="' + imgSrc + '" alt="" /></div>'
        : '<div class="farm-icon">' + (m ? m.emoji || '👾' : '👾') + '</div>';
      statusText = '⭐ 大人';
      cardClass += ' adult';
    }
    const m = entry.monster;
    const name = m ? m.name : city + 'の卵';
    return '<div class="' + cardClass + '" onclick="showFarmMonster(\'' + city + '\')">' +
      iconHtml +
      '<div class="farm-info">' +
        '<div class="farm-city">' + city + '</div>' +
        '<div class="farm-name">' + name + '</div>' +
        '<div class="farm-status">' + statusText + '</div>' +
        timerHtml +
      '</div></div>';
  }).join('');
  if (farmTimerInterval) clearInterval(farmTimerInterval);
  farmTimerInterval = setInterval(() => {
    if (currentTab === 'farm' && currentFarmTab === 'monsters') renderFarm();
  }, 1000);
}

function showFarmMonster(city) {
  const farm = getFarmData();
  const entry = farm[city];
  if (!entry || !entry.monster) return;
  switchTab('generate');
  renderMonster(entry.monster);
}

function renderMonster(m) {
  document.getElementById('monCity').textContent = m.city;
  document.getElementById('monName').textContent = m.name;
  document.getElementById('monConcept').textContent = m.concept;
  document.getElementById('monLore').textContent = m.lore;
  const stageBadge = document.getElementById('monStageBadge');
  stageBadge.innerHTML = m.stage === 'child'
    ? '<span class="stage-badge child">👶 子供</span>'
    : '<span class="stage-badge adult">⭐ 大人</span>';
  const imgEl = document.getElementById('monIconImg');
  const emojiEl = document.getElementById('monEmoji');
  if (m.imageUrl) {
    imgEl.src = m.imageUrl;
    imgEl.style.display = 'block';
    emojiEl.style.display = 'none';
    imgEl.onerror = function() {
      imgEl.style.display = 'none';
      emojiEl.style.display = 'block';
      emojiEl.textContent = m.emoji || '👾';
    };
  } else {
    imgEl.style.display = 'none';
    emojiEl.style.display = 'block';
    emojiEl.textContent = m.emoji || '👾';
  }
  document.getElementById('monTypes').innerHTML = (m.types || []).map(t => {
    const color = TYPE_COLORS[t] || '#ffffff';
    return '<span class="type-badge" style="border-color:' + color + ';color:' + color + '">' + t + 'タイプ</span>';
  }).join('');
  const stats = m.stats || {};
  document.getElementById('monStats').innerHTML = [
    { label: 'HP', value: stats.hp }, { label: 'ATK', value: stats.atk },
    { label: 'DEF', value: stats.def }, { label: 'SPD', value: stats.spd },
  ].map(s => '<div class="stat-item"><div class="stat-label">' + s.label + '</div><div class="stat-value">' + (s.value || '—') + '</div></div>').join('');
  const strongTags = (m.weatherStrong || []).map(w => '<span class="weather-tag strong">◎ ' + (WEATHER_LABELS[w] || w) + '</span>').join('');
  const weakTags = (m.weatherWeak || []).map(w => '<span class="weather-tag weak">✕ ' + (WEATHER_LABELS[w] || w) + '</span>').join('');
  document.getElementById('monWeather').innerHTML = strongTags + weakTags;
  document.getElementById('resultCard').classList.add('visible');
}

const trainerName = getTrainerName();
if (!trainerName) {
  document.getElementById('nameModal').classList.remove('hidden');
} else {
  document.getElementById('nameModal').classList.add('hidden');
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveTrainerName();
});

updateFarmCount();
  renderTrainerCard();
detectLocation();
</script>
