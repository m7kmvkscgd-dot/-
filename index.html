<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご当地モンスター</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0d1117;
    color: #f0ebe0;
    min-height: 100vh;
  }

  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('/hero.png');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    filter: brightness(0.5);
    z-index: 0;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;

  .logo { text-align: center; }

  .logo h1 {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.8rem;
    color: #f5d67a;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(245,214,122,0.5), 2px 2px 0 #000;
    line-height: 1.2;
  }

  .logo p {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #aaa;
    margin-top: 6px;
  }

  .tagline {
    font-size: 1rem;
    color: #f0ebe0;
    text-align: center;
    text-shadow: 1px 1px 4px #000;
    letter-spacing: 0.05em;
  }

  .tab-bar { display: flex; gap: 8px; width: 100%; }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: #aaa;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: rgba(245,214,122,0.15);
    border-color: #f5d67a;
    color: #f5d67a;
  }

  .location-box {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }

  .location-text { font-size: 0.9rem; color: #f0ebe0; }
  .location-city { font-size: 1.4rem; font-weight: 700; color: #f5d67a; margin: 4px 0; }
  .location-sub { font-size: 0.75rem; color: #aaa; }

  .gen-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #c0392b, #922b21);

    border-radius: 10px;
    color: white;
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 15px rgba(192,57,43,0.4);
    width: 100%;
  }

  .gen-btn:hover { opacity: 0.85; }
  .gen-btn:active { transform: scale(0.97); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .egg-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #8e44ad, #6c3483);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 15px rgba(142,68,173,0.4);

  .egg-btn:hover { opacity: 0.85; }
  .egg-btn:active { transform: scale(0.97); }
  .egg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #f5d67a;
    border-radius: 50%;

    margin: 0 auto 16px;
  }

  .loading-text { font-size: 0.85rem; color: #aaa; }

  .error-state {
    background: rgba(192,57,43,0.2);
    border: 1px solid #c0392b;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.85rem;
    color: #ff9999;
    display: none;
    width: 100%;
  }

  .error-state.visible { display: block; }

    width: 100%;
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(245,214,122,0.3);
    border-radius: 16px;
    padding: 24px;

    display: none;

    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);

  .monster-icon-wrap {

    height: 100px;
    border-radius: 12px;

    flex-shrink: 0;
    background: rgba(255,255,255,0.05);

    align-items: center;

  .stage-badge.adult { background: rgba(245,214,122,0.2); border: 1px solid #f5d67a; color: #f5d67a; }

    color: #888;

</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">

    </div>

        <div class="loading-text" id="loadingText">現在地を取得中...</div>

        <div class="section" style="margin-bottom:0">

        </div>
      </div>
    </div>

    <div class="farm-panel" id="farmTab">
      <div class="farm-grid" id="farmGrid"></div>
    </div>

  </div>
</div>

function detectWard(lat, lon) {
  for (const [city, data] of Object.entries(SPECIAL_WARDS)) {
    const b = data.bounds;
    if (lat >= b.minLat && lat <= b.maxLat && lon >= b.minLon && lon <= b.maxLon) {
      for (const ward of data.wards) {
        if (lat >= ward.minLat && lat <= ward.maxLat && lon >= ward.minLon && lon <= ward.maxLon) {
          return ward.name;
        }
      }
      return city === 'tokyo' ? '東京都内' : '大阪市内';
    }
  }
  return null;
}

function getUserId() {
  let uid = localStorage.getItem('userId');
  if (!uid) {
    uid = 'user_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('userId', uid);
  }
  return uid;
}

function getFarmData() {
  const data = localStorage.getItem('farmData');
  return data ? JSON.parse(data) : {};
}

function saveFarmData(data) {
  localStorage.setItem('farmData', JSON.stringify(data));
  updateFarmCount();
}

function updateFarmCount() {
  const farm = getFarmData();
  const count = Object.keys(farm).length;
  document.getElementById('farmCount').textContent = count > 0 ? '(' + count + ')' : '';
}

function formatTimer(ms) {
  if (ms <= 0) return '孵化準備完了！';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (h > 0) return h + '時間' + m + '分';
  if (m > 0) return m + '分' + s + '秒';
  return s + '秒';
}

let currentTab = 'generate';
let detectedCity = '';
let detectedWeather = '';
let detectedTemp = '';
let farmTimerInterval = null;

async function detectLocation() {
  document.getElementById('detectedCity').textContent = '取得中...';
  document.getElementById('eggBtn').disabled = true;

  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 })
    );
    const { latitude: lat, longitude: lon } = pos.coords;

    // 東京23区・大阪24区チェック
    const ward = detectWard(lat, lon);

    // 逆ジオコーディング
    let cityName = ward;
    if (!cityName) {
      const geoRes = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=ja');
      const geoData = await geoRes.json();
      const addr = geoData.address || {};
      cityName = addr.city || addr.town || addr.village || addr.county || '不明';
    }

    detectedCity = cityName;
    document.getElementById('detectedCity').textContent = cityName;
    document.getElementById('detectedSub').textContent = '緯度 ' + lat.toFixed(3) + ' 経度 ' + lon.toFixed(3);

    // 天気取得
    try {
      const weatherRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,pressure_msl,weathercode&timezone=auto');
      const weatherData = await weatherRes.json();
      const c = weatherData.current;
      const weatherType = WEATHER_CODES[c.weathercode] || 'clear';
      detectedWeather = weatherType;
      detectedTemp = c.temperature_2m;
      const wLabel = WEATHER_LABELS[weatherType] || weatherType;
      document.getElementById('detectedSub').textContent = wLabel + ' ' + c.temperature_2m + '°C';
    } catch(e) {}

    document.getElementById('eggBtn').disabled = false;

  } catch(e) {
    document.getElementById('detectedCity').textContent = '位置情報を取得できませんでした';
    document.getElementById('detectedSub').textContent = '位置情報の許可が必要です';
  }
}

async function pickupEgg() {
  if (!detectedCity) return;
  const userId = getUserId();

  document.getElementById('eggBtn').disabled = true;
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('loadingText').textContent = '卵を探しています...';
  document.getElementById('eggResult').classList.remove('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('errorState').classList.remove('visible');

  try {
    const res = await fetch('/api/egg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'pickup', city: detectedCity, userId }),
    });
    const data = await res.json();

    document.getElementById('loadingState').classList.remove('visible');

    if (data.status === 'egg_picked') {
      const farm = getFarmData();
      farm[detectedCity] = { stage: 'egg', egg: data.egg, weatherInfo: detectedWeather, temp: detectedTemp };
      saveFarmData(farm);
      showEggResult('🥚 卵を拾いました！', detectedCity + 'の卵を手に入れました。\n5時間後に孵化します。牧場で確認してください！');
    } else if (data.status === 'already_have_egg') {
      showEggResult('🥚 すでに卵があります', detectedCity + 'の卵はすでに持っています。牧場で確認してください。');
    } else if (data.status === 'already_generated') {
      renderMonster(data.monster);
    }
  } catch(e) {
    document.getElementById('loadingState').classList.remove('visible');
    const errEl = document.getElementById('errorState');
    errEl.textContent = 'エラー: ' + e.message;
    errEl.classList.add('visible');
  } finally {
    document.getElementById('eggBtn').disabled = false;
  }
}

function showEggResult(title, text) {
  document.getElementById('eggResultTitle').textContent = title;
  document.getElementById('eggResultText').textContent = text;
  document.getElementById('eggResult').classList.add('visible');
}

async function checkAndHatch(city) {
  const userId = getUserId();
  const farm = getFarmData();
  const entry = farm[city];
  if (!entry) return;

  const now = Date.now();
  const egg = entry.egg;

  if (now >= egg.growAt) {
    // 大人になる時間
    if (entry.stage !== 'adult' || !entry.monster || entry.monster.stage !== 'adult') {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, weatherInfo: entry.weatherInfo, stage: 'adult' }),
      });
      const monster = await res.json();
      farm[city] = { ...entry, stage: 'adult', monster };
      saveFarmData(farm);
    }
  } else if (now >= egg.hatchAt) {
    // 子供になる時間
    if (entry.stage !== 'child' && entry.stage !== 'adult') {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, weatherInfo: entry.weatherInfo, stage: 'child' }),
      });
      const monster = await res.json();
      farm[city] = { ...entry, stage: 'child', monster };
      saveFarmData(farm);
    }
  }
}

function switchTab(tab) {
  currentTab = tab;
  const btns = document.querySelectorAll('.tab-btn');
  btns[0].classList.toggle('active', tab === 'generate');
  btns[1].classList.toggle('active', tab === 'farm');
  document.getElementById('generateTab').style.display = tab === 'generate' ? 'flex' : 'none';
  document.getElementById('farmTab').classList.toggle('visible', tab === 'farm');
  if (tab === 'farm') renderFarm();
}

async function renderFarm(skipHatchCheck = false) {
  const farm = getFarmData();
  const grid = document.getElementById('farmGrid');

  if (Object.keys(farm).length === 0) {
    grid.innerHTML = '<div class="farm-empty">まだモンスターがいません<br>現地に行って卵を拾おう！</div>';
    return;
  }

  // 孵化チェック（タイマーからの呼び出し時はスキップ）
  if (!skipHatchCheck) {
    for (const city of Object.keys(farm)) {
      await checkAndHatch(city);
    }
  }

  const updatedFarm = getFarmData();
  const now = Date.now();

  grid.innerHTML = Object.entries(updatedFarm).map(([city, entry]) => {
    const egg = entry.egg;
    let iconHtml = '';
    let statusText = '';
    let timerText = '';
    let cardClass = 'farm-card';

    if (entry.stage === 'egg') {
      iconHtml = '<div class="farm-icon">🥚</div>';
      const remaining = egg.hatchAt - now;
      statusText = '卵';
      timerText = remaining > 0 ? '孵化まで ' + formatTimer(remaining) : '孵化準備完了！';
      cardClass += ' egg';
    } else if (entry.stage === 'child') {
      const m = entry.monster;
      const imgSrc = m && m.imageUrl;
      iconHtml = imgSrc
        ? '<div class="farm-icon"><img src="' + imgSrc + '" alt="' + (m.name || '') + '" /></div>'
        : '<div class="farm-icon">' + (m ? m.emoji || '👶' : '👶') + '</div>';
      const remaining = egg.growAt - now;
      statusText = '子供';
      timerText = remaining > 0 ? '大人まで ' + formatTimer(remaining) : '進化準備完了！';
      cardClass += ' child';
    } else {
      const m = entry.monster;
      const imgSrc = m && m.imageUrl;
      iconHtml = imgSrc
        ? '<div class="farm-icon"><img src="' + imgSrc + '" alt="' + (m.name || '') + '" /></div>'
        : '<div class="farm-icon">' + (m ? m.emoji || '👾' : '👾') + '</div>';
      statusText = '大人';
      cardClass += ' adult';
    }

    const m = entry.monster;
    const name = m ? m.name : city + 'の卵';

    return '<div class="' + cardClass + '" onclick="showFarmMonster(\'' + city + '\')">' +
      iconHtml +
      '<div class="farm-info">' +
        '<div class="farm-city">' + city + '</div>' +
        '<div class="farm-name">' + name + '</div>' +
        '<div class="farm-status">' + statusText + '</div>' +
        (timerText ? '<div class="farm-timer">' + timerText + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  // タイマー更新
  if (farmTimerInterval) clearInterval(farmTimerInterval);
  farmTimerInterval = setInterval(() => {
if (currentTab === 'farm') renderFarm(true);
  }, 1000);
}

function showFarmMonster(city) {
  const farm = getFarmData();
  const entry = farm[city];
  if (!entry || !entry.monster) return;
  switchTab('generate');
  renderMonster(entry.monster);
}

function renderMonster(m) {
  document.getElementById('monCity').textContent = m.city;
  document.getElementById('monName').textContent = m.name;
  document.getElementById('monConcept').textContent = m.concept;
  document.getElementById('monLore').textContent = m.lore;

  const stageBadge = document.getElementById('monStageBadge');
  if (m.stage === 'child') {
    stageBadge.innerHTML = '<span class="stage-badge child">👶 子供</span>';
  } else {
    stageBadge.innerHTML = '<span class="stage-badge adult">⭐ 大人</span>';
  }

  const imgEl = document.getElementById('monIconImg');
  const emojiEl = document.getElementById('monEmoji');
  if (m.imageUrl) {
    imgEl.src = m.imageUrl;
    imgEl.style.display = 'block';
    emojiEl.style.display = 'none';
    imgEl.onerror = function() {
      imgEl.style.display = 'none';
      emojiEl.style.display = 'block';
      emojiEl.textContent = m.emoji || '👾';
    };
  } else {
    imgEl.style.display = 'none';
    emojiEl.style.display = 'block';
    emojiEl.textContent = m.emoji || '👾';
  }

  const typesEl = document.getElementById('monTypes');
  typesEl.innerHTML = (m.types || []).map(t => {
    const color = TYPE_COLORS[t] || '#ffffff';
    return '<span class="type-badge" style="border-color:' + color + ';color:' + color + '">' + t + 'タイプ</span>';
  }).join('');

  const stats = m.stats || {};
  document.getElementById('monStats').innerHTML = [
    { label: 'HP', value: stats.hp },
    { label: 'ATK', value: stats.atk },
    { label: 'DEF', value: stats.def },
    { label: 'SPD', value: stats.spd },
  ].map(s =>
    '<div class="stat-item"><div class="stat-label">' + s.label + '</div><div class="stat-value">' + (s.value || '—') + '</div></div>'
  ).join('');

  const weatherEl = document.getElementById('monWeather');
  const strongTags = (m.weatherStrong || []).map(w =>
    '<span class="weather-tag strong">◎ ' + (WEATHER_LABELS[w] || w) + '</span>'
  ).join('');
  const weakTags = (m.weatherWeak || []).map(w =>
    '<span class="weather-tag weak">✕ ' + (WEATHER_LABELS[w] || w) + '</span>'
  ).join('');
  weatherEl.innerHTML = strongTags + weakTags;

  document.getElementById('resultCard').classList.add('visible');
}

updateFarmCount();
detectLocation();
</script>
