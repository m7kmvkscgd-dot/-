<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご当地モンスター生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0d1117;
    color: #f0ebe0;
    min-height: 100vh;
  }

  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('hero.png');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.35);
    z-index: 0;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo {
    text-align: center;
  }

  .logo h1 {
    font-family: 'Zen Antique Soft', serif;
    font-size: 2.8rem;
    color: #f5d67a;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(245,214,122,0.5), 2px 2px 0 #000;
    line-height: 1.2;
  }

  .logo p {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #aaa;
    margin-top: 6px;
  }

  .tagline {
    font-size: 1rem;
    color: #f0ebe0;
    text-align: center;
    text-shadow: 1px 1px 4px #000;
    letter-spacing: 0.05em;
  }

  .search-box {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    color: #f0ebe0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: #f5d67a;
  }

  input[type="text"]::placeholder {
    color: rgba(255,255,255,0.35);
  }

  .gen-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #c0392b, #922b21);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(192,57,43,0.4);
  }

  .gen-btn:hover { opacity: 0.85; }
  .gen-btn:active { transform: scale(0.97); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .history-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .history-chip {
    padding: 5px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    font-size: 0.75rem;
    color: #aaa;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .history-chip:hover { border-color: #f5d67a; color: #f5d67a; }

  .loading-state {
    text-align: center;
    padding: 32px;
    display: none;
  }

  .loading-state.visible { display: block; }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #f5d67a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.85rem;
    color: #aaa;
  }

  .error-state {
    background: rgba(192,57,43,0.2);
    border: 1px solid #c0392b;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.85rem;
    color: #ff9999;
    display: none;
    width: 100%;
  }

  .error-state.visible { display: block; }

  /* カード */
  .card {
    width: 100%;
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(245,214,122,0.3);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .card.visible { display: block; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .monster-emoji-large {
    font-size: 4rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(245,214,122,0.4));
  }

  .monster-meta h2 {
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.6rem;
    color: #f5d67a;
    margin-bottom: 4px;
  }

  .monster-meta .city-name {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 8px;
  }

  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-right: 4px;
    margin-bottom: 4px;
    border: 1px solid;
  }

  .section { margin-bottom: 18px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-content {
    font-size: 0.88rem;
    line-height: 1.8;
    color: #f0ebe0;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .stat-item {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-item .stat-label {
    font-size: 0.6rem;
    color: #888;
    margin-bottom: 4px;
  }

  .stat-item .stat-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: #f5d67a;
  }

  .weather-affinity {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .weather-tag {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    border: 1px solid;
  }

  .weather-tag.strong { border-color: #27ae60; color: #27ae60; }
