<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご当地モンスター生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0d1117;
    color: #f0ebe0;
    min-height: 100vh;
  }

  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

.hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('/hero.png');
    background-size: cover;
    background-position: center 30% ;
    background-repeat: no-repeat;
    filter: brightness(0.5);
    z-index: 0;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo {
    text-align: center;
  }

.logo h1 {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.8rem;
    color: #f5d67a;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(245,214,122,0.5), 2px 2px 0 #000;
    line-height: 1.2;
  }

  .logo p {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #aaa;
    margin-top: 6px;
  }

  .tagline {
    font-size: 1rem;
    color: #f0ebe0;
    text-align: center;
    text-shadow: 1px 1px 4px #000;
    letter-spacing: 0.05em;
  }

  .search-box {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

.input-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    color: #f0ebe0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: #f5d67a;
  }

  input[type="text"]::placeholder {
    color: rgba(255,255,255,0.35);
  }

  .gen-btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #c0392b, #922b21);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(192,57,43,0.4);
  }

  .gen-btn:hover { opacity: 0.85; }
  .gen-btn:active { transform: scale(0.97); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .history-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .history-chip {
    padding: 5px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    font-size: 0.75rem;
    color: #aaa;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .history-chip:hover { border-color: #f5d67a; color: #f5d67a; }

  .loading-state {
    text-align: center;
    padding: 32px;
    display: none;
  }

  .loading-state.visible { display: block; }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #f5d67a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.85rem;
    color: #aaa;
  }

  .error-state {
    background: rgba(192,57,43,0.2);
    border: 1px solid #c0392b;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.85rem;
    color: #ff9999;
    display: none;
    width: 100%;
  }

  .error-state.visible { display: block; }

  /* カード */
  .card {
    width: 100%;
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(245,214,122,0.3);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .card.visible { display: block; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .monster-emoji-large {
    font-size: 4rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(245,214,122,0.4));
  }

  .monster-meta h2 {
    font-family: 'Hachi Maru Pop', serif;
    font-size: 1.6rem;
    color: #f5d67a;
    margin-bottom: 4px;
  }

  .monster-meta .city-name {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 8px;
  }

  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-right: 4px;
    margin-bottom: 4px;
    border: 1px solid;
  }

  .section { margin-bottom: 18px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-content {
    font-size: 0.88rem;
    line-height: 1.8;
    color: #f0ebe0;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .stat-item {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-item .stat-label {
    font-size: 0.6rem;
    color: #888;
    margin-bottom: 4px;
  }

  .stat-item .stat-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: #f5d67a;
  }

  .weather-affinity {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .weather-tag {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    border: 1px solid;
  }

  .weather-tag.strong { border-color: #27ae60; color: #27ae60; }
  .weather-tag.weak { border-color: #c0392b; color: #c0392b; }

  .prompt-box {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.75rem;
    line-height: 1.7;
    color: #ccc;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .copy-btn {
    margin-top: 8px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #888;
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .copy-btn:hover { border-color: #f0ebe0; color: #f0ebe0; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">

    <div class="logo">
      <h1>ご当地モンスター<br>生成器</h1>
      <p>MONSTER GENERATOR — PROTOTYPE</p>
    </div>

    <p class="tagline">全国のご当地モンスターを集めよう！</p>

    <div class="search-box">
      <div class="input-row">
        <input type="text" id="cityInput" placeholder="市の名前を入力（例：大阪市、金沢市）" />
        <button class="gen-btn" id="genBtn" onclick="generate()">生成</button>
      </div>
      <div id="historyWrap" style="display:none">
        <div class="history-panel" id="historyPanel"></div>
      </div>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">市の歴史・文化を調査中...</div>
    </div>

    <div class="error-state" id="errorState"></div>

    <div class="card" id="resultCard">
      <div class="card-header">
        <div class="monster-emoji-large" id="monEmoji"></div>
        <div class="monster-meta">
          <div class="city-name" id="monCity"></div>
          <h2 id="monName"></h2>
          <div id="monTypes"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">コンセプト</div>
        <div class="section-content" id="monConcept"></div>
      </div>

      <div class="section">
        <div class="section-label">ステータス</div>
        <div class="stat-grid" id="monStats"></div>
      </div>

      <div class="section">
        <div class="section-label">天気相性</div>
        <div class="weather-affinity" id="monWeather"></div>
      </div>

      <div class="section">
        <div class="section-label">AIイラスト生成プロンプト（日本語）</div>
        <div class="prompt-box" id="monPromptJa"></div>
        <button class="copy-btn" onclick="copyPrompt('ja')">コピー</button>
      </div>

      <div class="section">
        <div class="section-label">AIイラスト生成プロンプト（English）</div>
        <div class="prompt-box" id="monPromptEn"></div>
        <button class="copy-btn" onclick="copyPrompt('en')">コピー</button>
      </div>

      <div class="section" style="margin-bottom:0">
        <div class="section-label">元ネタ</div>
        <div class="section-content" id="monLore"></div>
      </div>
    </div>

  </div>
</div>

<script>
const TYPE_COLORS = {
  '炎': '#ff6644', '水': '#4499ff', '雷': '#ffdd00', '氷': '#88eeff',
  '風': '#44ffaa', '土': '#cc9944', '闇': '#cc66ff', '光': '#ffffcc', '鋼': '#aaaacc',
};

const WEATHER_LABELS = {
  'clear': '☀️ 晴れ', 'rain': '🌧️ 雨', 'thunder': '⛈️ 嵐',
  'snow': '❄️ 雪', 'wind': '💨 強風', 'cloud': '☁️ 曇り', 'fog': '🌫️ 霧',
};

let history = [];
let lastPromptJa = '';
let lastPromptEn = '';

async function generate(cityOverride) {
  const input = document.getElementById('cityInput');
  const city = cityOverride || input.value.trim();
  // 天気取得
  let weatherInfo = '';
  try {
    const pos = await new Promise((resolve, reject) => 
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 })
    );
    const { latitude: lat, longitude: lon } = pos.coords;
    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,pressure_msl,weathercode&timezone=auto`);
    const weatherData = await weatherRes.json();
    const c = weatherData.current;
    const code = c.weathercode;
    let weatherType = 'clear';
    if (code >= 61 && code <= 67) weatherType = 'rain';
    else if (code >= 71 && code <= 77) weatherType = 'snow';
    else if (code >= 95) weatherType = 'thunder';
    else if (code >= 2) weatherType = 'cloud';
    weatherInfo = `Current weather: ${weatherType}, temperature: ${c.temperature_2m}C, pressure: ${c.pressure_msl}hPa`;
  } catch(e) {
    weatherInfo = 'Weather unavailable';
  }
  if (!city) return;
  if (!cityOverride) input.value = city;

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('errorState').classList.remove('visible');

  const steps = ['市の歴史・文化を調査中...', '特産品・地形を分析中...', 'モンスターを設計中...', 'プロンプトを生成中...'];
  let stepIdx = 0;
  const stepInterval = setInterval(() => {
    stepIdx = (stepIdx + 1) % steps.length;
    document.getElementById('loadingText').textContent = steps[stepIdx];
  }, 1200);

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ city, weatherInfo }),
    });

    const data = await response.json();
    clearInterval(stepInterval);

    if (data.error) throw new Error(data.error);

    const monster = data;
    renderMonster(monster);

    if (!history.includes(city)) {
      history.unshift(city);
      if (history.length > 8) history.pop();
      renderHistory();
    }

  } catch (e) {
    clearInterval(stepInterval);
    const errEl = document.getElementById('errorState');
    errEl.textContent = 'エラー: ' + e.message;
    errEl.classList.add('visible');
  } finally {
    document.getElementById('loadingState').classList.remove('visible');
    document.getElementById('genBtn').disabled = false;
  }
}

function renderMonster(m) {
  document.getElementById('monEmoji').textContent = m.emoji || '👾';
  document.getElementById('monCity').textContent = m.city;
  document.getElementById('monName').textContent = m.name;
  document.getElementById('monConcept').textContent = m.concept;
  document.getElementById('monLore').textContent = m.lore;

  const typesEl = document.getElementById('monTypes');
  typesEl.innerHTML = (m.types || []).map(t => {
    const color = TYPE_COLORS[t] || '#ffffff';
    return `<span class="type-badge" style="border-color:${color};color:${color}">${t}タイプ</span>`;
  }).join('');

  const stats = m.stats || {};
  document.getElementById('monStats').innerHTML = [
    { label: 'HP', value: stats.hp },
    { label: 'ATK', value: stats.atk },
    { label: 'DEF', value: stats.def },
    { label: 'SPD', value: stats.spd },
  ].map(s => `
    <div class="stat-item">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value || '—'}</div>
    </div>
  `).join('');

  const weatherEl = document.getElementById('monWeather');
  const strongTags = (m.weatherStrong || []).map(w =>
    `<span class="weather-tag strong">◎ ${WEATHER_LABELS[w] || w}</span>`
  ).join('');
  const weakTags = (m.weatherWeak || []).map(w =>
    `<span class="weather-tag weak">✕ ${WEATHER_LABELS[w] || w}</span>`
  ).join('');
  weatherEl.innerHTML = strongTags + weakTags;

  lastPromptJa = (m.promptJa || []).map((p, i) => `${i + 1}. ${p}`).join('\n');
  lastPromptEn = (m.promptEn || []).map((p, i) => `${i + 1}. ${p}`).join('\n');
  document.getElementById('monPromptJa').textContent = lastPromptJa;
  document.getElementById('monPromptEn').textContent = lastPromptEn;

  document.getElementById('resultCard').classList.add('visible');
}

function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  const panel = document.getElementById('historyPanel');
  if (history.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  panel.innerHTML = history.map(c =>
    `<span class="history-chip" onclick="generate('${c}')">${c}</span>`
  ).join('');
}

function copyPrompt(lang) {
  const text = lang === 'ja' ? lastPromptJa : lastPromptEn;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.copy-btn');
    const idx = lang === 'ja' ? 0 : 1;
    btns[idx].textContent = 'コピー完了';
    setTimeout(() => btns[idx].textContent = 'コピー', 1500);
  });
}

document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
