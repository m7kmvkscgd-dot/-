<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご当地モンスター生成器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f0ebe0;
    --accent: #c0392b;
    --gold: #d4a017;
    --mist: #7f8c8d;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 24px;
    text-align: center;
    border-bottom: 1px solid #ffffff18;
  }

  h1 {
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
  }

  h1 span {
    color: var(--paper);
    font-size: 0.75rem;
    display: block;
    letter-spacing: 0.1em;
    margin-top: 4px;
    opacity: 0.5;
  }

  .main {
    width: 100%;
    max-width: 560px;
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    background: #ffffff0a;
    border: 1px solid #ffffff28;
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--paper);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
  }

  input[type="text"]::placeholder {
    color: var(--mist);
  }

  .gen-btn {
    padding: 14px 24px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Zen Antique Soft', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .gen-btn:hover { background: #a93226; }
  .gen-btn:active { transform: scale(0.97); }
  .gen-btn:disabled { background: #ffffff18; color: var(--mist); cursor: not-allowed; }

  .card {
    background: #ffffff08;
    border: 1px solid #ffffff18;
    border-radius: 12px;
    padding: 24px;
    display: none;
  }

  .card.visible { display: block; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #ffffff12;
  }

  .monster-emoji-large {
    font-size: 4rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px #d4a01744);
  }

  .monster-meta h2 {
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .monster-meta .city-name {
    font-size: 0.75rem;
    color: var(--mist);
    margin-bottom: 8px;
  }

  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-right: 4px;
    margin-bottom: 4px;
  }

  .section {
    margin-bottom: 18px;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--mist);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-content {
    font-size: 0.88rem;
    line-height: 1.8;
    color: var(--paper);
  }

  .prompt-box {
    background: #000000aa;
    border: 1px solid #ffffff18;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .copy-btn {
    margin-top: 8px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid #ffffff28;
    border-radius: 6px;
    color: var(--mist);
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .copy-btn:hover { border-color: var(--paper); color: var(--paper); }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-item {
    background: #ffffff08;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-item .stat-label {
    font-size: 0.6rem;
    color: var(--mist);
    margin-bottom: 4px;
  }

  .stat-item .stat-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--paper);
  }

  .weather-affinity {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .weather-tag {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    border: 1px solid;
  }

  .weather-tag.strong { border-color: var(--green); color: var(--green); }
  .weather-tag.weak { border-color: var(--accent); color: var(--accent); }

  .loading-state {
    text-align: center;
    padding: 32px;
    display: none;
  }

  .loading-state.visible { display: block; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #ffffff18;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.85rem;
    color: var(--mist);
  }

  .error-state {
    background: #3d0000;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 16px;
    font-size: 0.85rem;
    color: #ff8888;
    display: none;
  }

  .error-state.visible { display: block; }

  .history-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .history-chip {
    padding: 6px 12px;
    background: #ffffff08;
    border: 1px solid #ffffff18;
    border-radius: 999px;
    font-size: 0.75rem;
    color: var(--mist);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .history-chip:hover { border-color: var(--gold); color: var(--gold); }

  .history-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--mist);
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>ご当地モンスター生成器<span>MONSTER GENERATOR — PROTOTYPE</span></h1>
</header>

<div class="main">
  <div class="input-row">
    <input type="text" id="cityInput" placeholder="市の名前を入力（例：大阪市、金沢市）" />
    <button class="gen-btn" id="genBtn" onclick="generate()">生成</button>
  </div>

  <div id="historyWrap" style="display:none">
    <div class="history-label">履歴</div>
    <div class="history-panel" id="historyPanel"></div>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">市の歴史・文化を調査中...</div>
  </div>

  <div class="error-state" id="errorState"></div>

  <div class="card" id="resultCard">
    <div class="card-header">
      <div class="monster-emoji-large" id="monEmoji"></div>
      <div class="monster-meta">
        <div class="city-name" id="monCity"></div>
        <h2 id="monName"></h2>
        <div id="monTypes"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">コンセプト</div>
      <div class="section-content" id="monConcept"></div>
    </div>

    <div class="section">
      <div class="section-label">ステータス</div>
      <div class="stat-grid" id="monStats"></div>
    </div>

    <div class="section">
      <div class="section-label">天気相性</div>
      <div class="weather-affinity" id="monWeather"></div>
    </div>

    <div class="section">
      <div class="section-label">AIイラスト生成プロンプト（日本語）</div>
      <div class="prompt-box" id="monPromptJa"></div>
      <button class="copy-btn" onclick="copyPrompt('ja')">コピー</button>
    </div>

    <div class="section">
      <div class="section-label">AIイラスト生成プロンプト（English）</div>
      <div class="prompt-box" id="monPromptEn"></div>
      <button class="copy-btn" onclick="copyPrompt('en')">コピー</button>
    </div>

    <div class="section" style="margin-bottom:0">
      <div class="section-label">元ネタ（歴史・文化的根拠）</div>
      <div class="section-content" id="monLore"></div>
    </div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  '炎': { bg: '#ff440022', border: '#ff4400', color: '#ff8866' },
  '水': { bg: '#0044ff22', border: '#0088ff', color: '#66aaff' },
  '雷': { bg: '#ffdd0022', border: '#ffdd00', color: '#ffee66' },
  '氷': { bg: '#00ddff22', border: '#00ddff', color: '#88eeff' },
  '風': { bg: '#00ff8822', border: '#00ff88', color: '#66ffaa' },
  '土': { bg: '#aa660022', border: '#aa6600', color: '#cc9944' },
  '闇': { bg: '#6600aa22', border: '#9900ff', color: '#cc66ff' },
  '光': { bg: '#ffffff22', border: '#ffffff88', color: '#ffffcc' },
  '鋼': { bg: '#888888aa', border: '#aaaaaa', color: '#cccccc' },
};

const WEATHER_LABELS = {
  'clear': '☀️ 晴れ',
  'rain': '🌧️ 雨',
  'thunder': '⛈️ 嵐',
  'snow': '❄️ 雪',
  'wind': '💨 強風',
  'cloud': '☁️ 曇り',
  'fog': '🌫️ 霧',
};

let history = [];
let lastPromptJa = '';
let lastPromptEn = '';

async function generate(cityOverride) {
  const input = document.getElementById('cityInput');
  const city = cityOverride || input.value.trim();
  if (!city) return;

  if (!cityOverride) input.value = city;

  // UI状態
  document.getElementById('genBtn').disabled = true;
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('errorState').classList.remove('visible');

  const steps = ['市の歴史・文化を調査中...', '特産品・地形を分析中...', 'モンスターを設計中...', 'プロンプトを生成中...'];
  let stepIdx = 0;
  const stepInterval = setInterval(() => {
    stepIdx = (stepIdx + 1) % steps.length;
    document.getElementById('loadingText').textContent = steps[stepIdx];
  }, 1200);

  try {
    const prompt = `あなたはゲームデザイナーです。「${city}」のご当地モンスターを設計してください。

まず${city}の以下の情報を内部で調査・分析してください：
- 歴史的背景（創設、合戦、人物、時代）
- 地形・気候（山、川、海、気温、降水量）
- 特産品・産業（食べ物、工芸品、伝統産業）
- 伝説・民話・妖怪伝承
- 現代的な特徴・シンボル

その分析をもとに、以下のJSON形式でモンスターを出力してください。JSONのみを出力し、前後に説明文やマークダウンは一切つけないこと。

{
  "name": "モンスターの名前（その市の特徴を反映した造語、カタカナ）",
  "emoji": "最もイメージに近い絵文字1文字",
  "city": "${city}",
  "concept": "このモンスターのコンセプト説明（2〜3文）",
  "types": ["タイプ1", "タイプ2"],
  "stats": {
    "hp": 数値(50-150),
    "atk": 数値(30-80),
    "def": 数値(20-70),
    "spd": 数値(20-70)
  },
  "weatherStrong": ["strong1", "strong2"],
  "weatherWeak": ["weak1", "weak2"],
  "promptJa": [
    "外観の特徴1",
    "外観の特徴2",
    "外観の特徴3",
    "外観の特徴4",
    "外観の特徴5",
    "スタイル指定（例：日本のアニメRPGスタイル、モンスターキャラクターデザイン）",
    "色調・雰囲気"
  ],
  "promptEn": [
    "visual feature 1",
    "visual feature 2",
    "visual feature 3",
    "visual feature 4",
    "visual feature 5",
    "style: Japanese anime RPG monster design, game character art",
    "color palette and mood"
  ],
  "lore": "このモンスターの歴史・文化的根拠（どの史実・伝承・地域特性から着想したか、3〜5文）"
}

タイプは以下から選択：炎、水、雷、氷、風、土、闇、光、鋼
weatherStrongとweatherWeakは以下から選択：clear、rain、thunder、snow、wind、cloud、fog
タイプと天気相性は論理的に一致させること（炎→clear強い、水→rain強い など）`;

const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ city }),
    });

    const data = await response.json();
    clearInterval(stepInterval);
    
if (data.error) throw new Error(data.error);

    const monster = data;

    renderMonster(monster);

    // 履歴追加
    if (!history.includes(city)) {
      history.unshift(city);
      if (history.length > 8) history.pop();
      renderHistory();
    }

  } catch (e) {
    clearInterval(stepInterval);
    const errEl = document.getElementById('errorState');
    errEl.textContent = `エラー: ${e.message}`;
    console.error('Full error:', e);
    errEl.classList.add('visible');
  } finally {
    document.getElementById('loadingState').classList.remove('visible');
    document.getElementById('genBtn').disabled = false;
  }
}

function renderMonster(m) {
  document.getElementById('monEmoji').textContent = m.emoji || '👾';
  document.getElementById('monCity').textContent = m.city;
  document.getElementById('monName').textContent = m.name;
  document.getElementById('monConcept').textContent = m.concept;
  document.getElementById('monLore').textContent = m.lore;

  // タイプバッジ
  const typesEl = document.getElementById('monTypes');
  typesEl.innerHTML = (m.types || []).map(t => {
    const c = TYPE_COLORS[t] || { bg: '#ffffff18', border: '#ffffff44', color: '#ffffff' };
    return `<span class="type-badge" style="background:${c.bg};border:1px solid ${c.border};color:${c.color}">${t}タイプ</span>`;
  }).join('');

  // ステータス
  const stats = m.stats || {};
  document.getElementById('monStats').innerHTML = [
    { label: 'HP', value: stats.hp },
    { label: 'ATK', value: stats.atk },
    { label: 'DEF', value: stats.def },
    { label: 'SPD', value: stats.spd },
  ].map(s => `
    <div class="stat-item">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value || '—'}</div>
    </div>
  `).join('');

  // 天気相性
  const weatherEl = document.getElementById('monWeather');
  const strongTags = (m.weatherStrong || []).map(w =>
    `<span class="weather-tag strong">◎ ${WEATHER_LABELS[w] || w}</span>`
  ).join('');
  const weakTags = (m.weatherWeak || []).map(w =>
    `<span class="weather-tag weak">✕ ${WEATHER_LABELS[w] || w}</span>`
  ).join('');
  weatherEl.innerHTML = strongTags + weakTags;

  // プロンプト
  lastPromptJa = (m.promptJa || []).map((p, i) => `${i + 1}. ${p}`).join('\n');
  lastPromptEn = (m.promptEn || []).map((p, i) => `${i + 1}. ${p}`).join('\n');
  document.getElementById('monPromptJa').textContent = lastPromptJa;
  document.getElementById('monPromptEn').textContent = lastPromptEn;

  document.getElementById('resultCard').classList.add('visible');
}

function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  const panel = document.getElementById('historyPanel');
  if (history.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  panel.innerHTML = history.map(c =>
    `<span class="history-chip" onclick="generate('${c}')">${c}</span>`
  ).join('');
}

function copyPrompt(lang) {
  const text = lang === 'ja' ? lastPromptJa : lastPromptEn;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.copy-btn');
    const idx = lang === 'ja' ? 0 : 1;
    btns[idx].textContent = 'コピー完了';
    setTimeout(() => btns[idx].textContent = 'コピー', 1500);
  });
}

document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
